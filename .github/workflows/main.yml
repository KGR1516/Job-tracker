name: Daily Job Openings

on:
  schedule:
    - cron: "0 4 * * *"   # 4:00 UTC = 8:00 AM UAE time, every day
  workflow_dispatch:        # allows manual "Run workflow" button

permissions:
  contents: write

jobs:
  fetch-jobs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch jobs and build Excel
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python fetch_jobs.py

      - name: Email the report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python send_email.py

      - name: Commit Excel report
        run: |
          git config user.name "job-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports/ docs/
          git commit -m "Job report $(date +%F)" || echo "Nothing to commit"
          git push
